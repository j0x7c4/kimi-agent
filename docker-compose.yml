version: "3.9"

services:
  gateway:
    build:
      context: .
      dockerfile: Dockerfile.gateway
    container_name: kimi-gateway
    restart: unless-stopped
    ports:
      - "${KIMI_WEB_PORT:-5494}:5494"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - session-data:/data/sessions
    environment:
      # LLM Configuration (at least one provider is required)
      - KIMI_API_KEY=${KIMI_API_KEY:-}
      - KIMI_BASE_URL=${KIMI_BASE_URL:-https://api.moonshot.cn/v1}
      - KIMI_MODEL_NAME=${KIMI_MODEL_NAME:-kimi-k2}
      - KIMI_MODEL_MAX_CONTEXT_SIZE=${KIMI_MODEL_MAX_CONTEXT_SIZE:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://api.openai.com/v1}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - ANTHROPIC_BASE_URL=${ANTHROPIC_BASE_URL:-https://api.anthropic.com}
      - LLM_PROVIDER=${LLM_PROVIDER:-kimi}
      - LLM_THINKING=${LLM_THINKING:-false}
      - LLM_TEMPERATURE=${LLM_TEMPERATURE:-0.7}

      # Web Server Security
      - KIMI_WEB_SESSION_TOKEN=${KIMI_WEB_SESSION_TOKEN}
      - KIMI_WEB_ALLOWED_ORIGINS=${KIMI_WEB_ALLOWED_ORIGINS:-*}
      - KIMI_WEB_ENFORCE_ORIGIN=${KIMI_WEB_ENFORCE_ORIGIN:-false}
      - KIMI_WEB_RESTRICT_SENSITIVE_APIS=${KIMI_WEB_RESTRICT_SENSITIVE_APIS:-false}
      - KIMI_WEB_MAX_PUBLIC_PATH_DEPTH=${KIMI_WEB_MAX_PUBLIC_PATH_DEPTH:-6}
      - KIMI_WEB_LAN_ONLY=${KIMI_WEB_LAN_ONLY:-false}

      # Container Orchestration
      - DOCKER_NETWORK=kimi-agent-network
      - SANDBOX_IMAGE=${SANDBOX_IMAGE:-kimi-agent-sandbox:latest}
      - SANDBOX_WORK_DIR=${SANDBOX_WORK_DIR:-/app}
      - MAX_SESSION_CONTAINERS=${MAX_SESSION_CONTAINERS:-50}

      # Session Container Resource Limits
      - SANDBOX_CPU_LIMIT=${SANDBOX_CPU_LIMIT:-2}
      - SANDBOX_MEMORY_LIMIT=${SANDBOX_MEMORY_LIMIT:-4g}
      - SANDBOX_DISK_LIMIT=${SANDBOX_DISK_LIMIT:-10g}
      - SANDBOX_PID_LIMIT=${SANDBOX_PID_LIMIT:-1000}
      - SANDBOX_TIMEOUT_SECONDS=${SANDBOX_TIMEOUT_SECONDS:-86400}

      # Feature Flags
      - ENABLE_BROWSER=${ENABLE_BROWSER:-true}
      - ENABLE_JUPYTER=${ENABLE_JUPYTER:-true}
      - ENABLE_SHELL_SANDBOX=${ENABLE_SHELL_SANDBOX:-true}
      - BLOCK_DANGEROUS_COMMANDS=${BLOCK_DANGEROUS_COMMANDS:-true}

      # Container Mode
      - KIMI_USE_CONTAINERS=true
      - KIMI_SHARE_DIR=/data/sessions

      # Custom Skills
      - CUSTOM_SKILLS_HOST_PATH=${CUSTOM_SKILLS_HOST_PATH:-}

      # HuggingFace Cache
      - HF_CACHE_HOST_PATH=${HF_CACHE_HOST_PATH:-}
    networks:
      - kimi-agent-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5494/healthz')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  kimi-agent-network:
    driver: bridge
    name: kimi-agent-network

volumes:
  session-data:
    driver: local
    name: session-data
